<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f0f13">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GYM LOG">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>GYM LOG</title>
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: #2e2e3e;
      --accent: #7c6af7;
      --accent-dim: #3d3580;
      --green: #3ecf8e;
      --orange: #f7a548;
      --text: #e8e8f0;
      --text-dim: #888899;
      --text-muted: #555566;
      --danger: #f75c5c;
      --yellow: #f7c948;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      min-height: 100dvh; overscroll-behavior: none;
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 14px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-logo { font-size: 18px; font-weight: 800; letter-spacing: 0.15em; color: var(--accent); }
    .header-date { font-size: 12px; color: var(--text-dim); }

    /* ── Tab Nav ── */
    .tab-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
    .tab-btn {
      flex: 1; padding: 14px 8px; background: none; border: none;
      color: var(--text-muted); font-size: 13px; font-weight: 700;
      letter-spacing: 0.08em; cursor: pointer; position: relative;
    }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: 0; left: 25%;
      width: 50%; height: 2px; background: var(--accent); border-radius: 2px 2px 0 0;
    }

    .main { padding: 16px 16px 110px; }

    /* ── Program cards ── */
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      color: var(--text-muted); margin: 18px 4px 10px;
    }
    .program-hero {
      background: linear-gradient(135deg, #2a2260, #1a1a22);
      border: 1px solid var(--accent-dim); border-radius: 16px;
      padding: 18px; margin-bottom: 8px; cursor: pointer;
    }
    .program-hero-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .day-badge {
      background: var(--accent); color: #fff; font-size: 11px; font-weight: 800;
      padding: 4px 10px; border-radius: 6px; letter-spacing: 0.1em;
    }
    .program-hero-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .program-hero-sub { font-size: 12px; color: var(--text-dim); }
    .program-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .program-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; cursor: pointer;
    }
    .program-card-icon { font-size: 22px; margin-bottom: 6px; }
    .program-card-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .program-card-count { font-size: 11px; color: var(--text-muted); }

    /* ── Workout view ── */
    .workout-nav {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .btn-back {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 8px 14px; font-size: 13px; cursor: pointer;
    }
    .workout-title { font-size: 16px; font-weight: 800; flex: 1; }
    .day-progress { font-size: 12px; color: var(--text-muted); }
    .day-progress span { color: var(--green); font-weight: 700; }

    /* rest timer */
    .timer-bar {
      display: flex; gap: 8px; align-items: center; margin-bottom: 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px;
    }
    .timer-label { font-size: 12px; color: var(--text-dim); flex: 1; }
    .timer-display { font-size: 18px; font-weight: 800; color: var(--yellow); min-width: 50px; text-align: center; }
    .timer-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    .timer-btn.active { border-color: var(--yellow); color: var(--yellow); }

    /* phase card */
    .phase-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
    }
    .phase-title { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--yellow); margin-bottom: 10px; }
    .phase-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid var(--border);
      font-size: 13px; color: var(--text-dim); gap: 8px;
    }
    .phase-item:last-child { border-bottom: none; }
    .phase-item-count { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }
    .phase-video {
      color: var(--accent); text-decoration: none; font-size: 12px; flex-shrink: 0;
    }

    /* exercise card */
    .exercise-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 10px; overflow: hidden;
    }
    .exercise-card.done { border-color: var(--green); opacity: 0.75; }
    .exercise-header { display: flex; align-items: center; padding: 14px 14px; gap: 10px; cursor: pointer; }
    .order-badge {
      width: 22px; height: 22px; border-radius: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .exercise-check {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
    }
    .exercise-card.done .exercise-check { background: var(--green); border-color: var(--green); }
    .check-icon { display: none; font-size: 12px; }
    .exercise-card.done .check-icon { display: block; color: #fff; }
    .exercise-info { flex: 1; min-width: 0; }
    .exercise-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .exercise-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 8px; flex-wrap: wrap; }
    .exercise-last { text-align: right; flex-shrink: 0; }
    .exercise-last-weight { font-size: 15px; font-weight: 700; color: var(--accent); }
    .exercise-last-label { font-size: 10px; color: var(--text-muted); }

    .exercise-detail { display: none; padding: 0 14px 16px; border-top: 1px solid var(--border); }
    .exercise-card.expanded .exercise-detail { display: block; }

    /* anim + guide */
    .anim-box {
      background: var(--surface2); border-radius: 12px;
      display: flex; justify-content: center; padding: 10px;
      margin: 12px 0;
    }
    .guide-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .guide-item {
      background: var(--surface2); border-radius: 10px; padding: 10px 12px;
    }
    .guide-item-label { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; margin-bottom: 4px; }
    .guide-prep .guide-item-label { color: var(--yellow); }
    .guide-motion .guide-item-label { color: var(--accent); }
    .guide-breath .guide-item-label { color: var(--green); }
    .guide-item-text { font-size: 12px; color: var(--text-dim); line-height: 1.6; }

    .video-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--accent); text-decoration: none;
      margin-bottom: 12px; padding: 6px 12px;
      background: var(--accent-dim); border-radius: 20px;
    }

    /* set table */
    .set-table { width: 100%; margin-bottom: 8px; border-collapse: collapse; }
    .set-table th {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      color: var(--text-muted); text-align: left; padding: 0 0 8px;
    }
    .set-table td { padding: 4px 4px 4px 0; }
    .set-num { font-size: 12px; color: var(--text-muted); width: 28px; }
    .num-input {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 15px; font-weight: 600;
      padding: 7px 6px; width: 64px; text-align: center;
      -moz-appearance: textfield;
    }
    .num-input:focus { outline: none; border-color: var(--accent); }
    .num-input::-webkit-inner-spin-button, .num-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .unit { font-size: 11px; color: var(--text-muted); padding: 0 2px; }

    /* bulk confirm */
    .bulk-confirm {
      background: #2a2440; border: 1px solid var(--accent);
      border-radius: 10px; padding: 10px 12px; margin-bottom: 10px;
      font-size: 12px; color: var(--text);
    }
    .bulk-confirm-btns { display: flex; gap: 8px; margin-top: 8px; }
    .bulk-btn {
      flex: 1; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    .bulk-yes { background: var(--accent); color: #fff; border: none; }
    .bulk-no { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }

    .btn-done {
      width: 100%; padding: 12px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.05em;
    }
    .btn-undone {
      width: 100%; padding: 10px; background: var(--surface2); color: var(--danger);
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px;
    }

    /* bottom bar */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(transparent, var(--bg) 30%);
      display: none;
    }
    .btn-finish {
      width: 100%; padding: 16px; background: var(--green); color: #0f1a14;
      border: none; border-radius: 14px; font-size: 15px; font-weight: 800;
      cursor: pointer; letter-spacing: 0.05em;
    }
    .btn-finish:disabled { background: var(--surface2); color: var(--text-muted); }

    /* ── Analysis tab ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 4px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 10px; text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

    /* calendar */
    .calendar-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
    }
    .calendar-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .calendar-month { font-size: 14px; font-weight: 800; }
    .cal-nav-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; width: 32px; height: 32px; font-size: 14px; cursor: pointer;
    }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow { text-align: center; font-size: 10px; color: var(--text-muted); padding: 4px 0; }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: 8px; font-size: 12px; color: var(--text-dim);
      position: relative;
    }
    .cal-day.other { color: var(--text-muted); opacity: 0.3; }
    .cal-day.today { border: 1px solid var(--accent); color: var(--accent); font-weight: 800; }
    .cal-day.trained { font-weight: 700; color: var(--text); }
    .cal-dot {
      width: 6px; height: 6px; border-radius: 50%; margin-top: 2px;
    }
    .dot-a { background: #a891ff; }
    .dot-b { background: #3ecf8e; }
    .dot-c { background: #f7a548; }
    .dot-p { background: #5ac8fa; }

    /* recovery */
    .recovery-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
    }
    .recovery-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
    .recovery-name { font-size: 12px; color: var(--text-dim); width: 90px; flex-shrink: 0; }
    .recovery-bar-bg {
      flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden;
    }
    .recovery-bar {
      height: 100%; border-radius: 4px; transition: width 0.3s;
    }
    .recovery-pct { font-size: 11px; font-weight: 700; width: 42px; text-align: right; }

    /* history */
    .history-session {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 10px; overflow: hidden;
    }
    .history-session-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .history-session-date { font-size: 13px; font-weight: 700; }
    .history-session-day { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; letter-spacing: 0.08em; }
    .day-a { background: #3d2d8a; color: #a891ff; }
    .day-b { background: #1e4a35; color: #3ecf8e; }
    .day-c { background: #4a2e1e; color: #f7a548; }
    .day-p { background: #1e3a4a; color: #5ac8fa; }
    .history-session-body { display: none; padding: 0 16px 14px; border-top: 1px solid var(--border); }
    .history-session.open .history-session-body { display: block; }
    .history-exercise-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; gap: 8px;
    }
    .history-exercise-row:last-child { border-bottom: none; }
    .history-exercise-name { color: var(--text-dim); }
    .history-exercise-sets { color: var(--text-muted); font-size: 11px; text-align: right; }
    .history-empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }

    /* toast */
    .toast {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--green); color: var(--green);
      padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600;
      opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* SVG animations */
    @keyframes pressH { 0%,100% { transform: translateX(0); } 50% { transform: translateX(22px); } }
    @keyframes pressV { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes pullDown { 0%,100% { transform: translateY(0); } 50% { transform: translateY(20px); } }
    @keyframes rowPull { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-20px); } }
    @keyframes curlRot { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-75deg); } }
    @keyframes pushRot { 0%,100% { transform: rotate(-70deg); } 50% { transform: rotate(0deg); } }
    @keyframes raiseRot { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-80deg); } }
    @keyframes legExtRot { 0%,100% { transform: rotate(60deg); } 50% { transform: rotate(0deg); } }
    @keyframes legCurlRot { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(70deg); } }
    @keyframes hipUp { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
    @keyframes legsClose { 0%,100% { transform: rotate(18deg); } 50% { transform: rotate(2deg); } }
    @keyframes legsOpen { 0%,100% { transform: rotate(2deg); } 50% { transform: rotate(18deg); } }
    @keyframes torsoRot { 0%,100% { transform: rotate(-18deg); } 50% { transform: rotate(18deg); } }
    @keyframes flyClose { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(55deg); } }
    @keyframes legPressExt { 0%,100% { transform: translate(0,0); } 50% { transform: translate(16px,-12px); } }
    .anim-part { animation-duration: 2.2s; animation-iteration-count: infinite; animation-timing-function: ease-in-out; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">GYM LOG</div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" id="tab-program" onclick="showTab('program')">💪 プログラム</button>
  <button class="tab-btn" id="tab-analysis" onclick="showTab('analysis')">📊 分析</button>
</div>

<div class="main" id="mainContent"></div>

<div class="bottom-bar" id="bottomBar">
  <button class="btn-finish" id="btnFinish" onclick="finishWorkout()">トレーニング完了！</button>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════
// 種目データベース
// ═══════════════════════════════════════════════

function getHistory() { try { return JSON.parse(localStorage.getItem('gymlog_history') || '[]'); } catch { return []; } }
function saveHistoryAll(h) { localStorage.setItem('gymlog_history', JSON.stringify(h)); }
function getMem(key) { try { return JSON.parse(localStorage.getItem(key) || '{}'); } catch { return {}; } }
function saveMem(key, v) { localStorage.setItem(key, JSON.stringify(v)); }

// ── 履歴の事前登録（6/30 DayA・7/1 DayB）＋旧データ移行 ──
function seedHistory() {
  let h = getHistory();
  let changed = false;
  // 旧形式(day:'A')→新形式(programId)へ移行
  h.forEach(rec => {
    if (!rec.programId && rec.day) {
      rec.programId = 'day' + rec.day;
      rec.label = PROGRAMS['day' + rec.day]?.name || '';
      rec.color = rec.day.toLowerCase();
      changed = true;
    }
  });
  const seeds = [
    { date:'2026-06-30', pid:'dayA' },
    { date:'2026-07-01', pid:'dayB' },
  ];
  seeds.forEach(s => {
    if (!h.find(r => r.date === s.date)) {
      const p = PROGRAMS[s.pid];
      h.push({
        date: s.date, programId: s.pid, label: p.name, color: p.color,
        exercises: p.exercises.map(([exId, sets, reps, w]) => ({
          exId, name: EX_DB[exId].name, sets, reps: Array(sets).fill(reps), weights: Array(sets).fill(w)
        }))
      });
      changed = true;
    }
  });
  if (changed) { h.sort((a,b)=>a.date.localeCompare(b.date)); saveHistoryAll(h); }
}

function getNextMainDay() {
  const h = getHistory().filter(r => MAIN_ROTATION.includes(r.programId));
  if (h.length === 0) return 'dayA';
  const last = h[h.length-1].programId;
  return MAIN_ROTATION[(MAIN_ROTATION.indexOf(last)+1) % 3];
}

function openProgram(pid) {
  currentProgram = pid;
  const p = PROGRAMS[pid];
  const wMem = getMem('gymlog_weights');
  const rMem = getMem('gymlog_reps');
  sessionState = {};
  p.exercises.forEach(([exId, sets, reps, w], i) => {
    const key = pid + '_' + exId;
    const savedW = wMem[key] || wMem[exId];  // 旧キー互換
    const savedR = rMem[key];
    let weights = savedW ? [...savedW] : Array(sets).fill(w);
    let repsArr = savedR ? [...savedR] : Array(sets).fill(reps);
    while (weights.length < sets) weights.push(w);
    while (repsArr.length < sets) repsArr.push(reps);
    sessionState[key] = { done:false, weights: weights.slice(0,sets), reps: repsArr.slice(0,sets) };
  });
  expandedId = null; pendingBulk = null;
  renderWorkout();
}

function renderExerciseList() {

}

function renderExerciseCard([exId, defSets, defReps, defW], i) {
  const ex = EX_DB[exId];
  const key = currentProgram + '_' + exId;
  const s = sessionState[key];
  const isDone = s.done, isExpanded = expandedId === key;

  let detail = '';
  if (isExpanded) {
    let setsHtml = `<table class="set-table"><tr><th>SET</th><th>重量</th><th>回数</th></tr>`;
    for (let j = 0; j < defSets; j++) {
      setsHtml += `<tr>
        <td class="set-num">${j+1}</td>
        <td><input class="num-input" type="number" inputmode="decimal" value="${s.weights[j]}"
          onchange="onNumChange('${key}','weights',${j},this.value)" onclick="this.select()"><span class="unit">kg</span></td>
        <td><input class="num-input" type="number" inputmode="numeric" value="${s.reps[j]}"
          onchange="onNumChange('${key}','reps',${j},this.value)" onclick="this.select()"><span class="unit">回</span></td>
      </tr>`;
    }
    setsHtml += '</table>';

    let bulkHtml = '';
    if (pendingBulk && pendingBulk.exKey === key) {
      const fieldName = pendingBulk.field === 'weights' ? '重量' : '回数';
      const unit = pendingBulk.field === 'weights' ? 'kg' : '回';
      bulkHtml = `<div class="bulk-confirm">
        残りのセットも <b>${pendingBulk.value}${unit}</b> に変更する？
        <div class="bulk-confirm-btns">
          <button class="bulk-btn bulk-yes" onclick="applyBulk(true)">全セット反映</button>
          <button class="bulk-btn bulk-no" onclick="applyBulk(false)">このセットのみ</button>
        </div>
      </div>`;
    }

    detail = `<div class="exercise-detail">
      <div class="anim-box">${animSVG(ex.anim)}</div>
      <div class="guide-grid">
        <div class="guide-item guide-prep"><div class="guide-item-label">🔧 準備</div><div class="guide-item-text">${ex.guide.prep}</div></div>
        <div class="guide-item guide-motion"><div class="guide-item-label">🏃 動作</div><div class="guide-item-text">${ex.guide.motion}</div></div>
        <div class="guide-item guide-breath"><div class="guide-item-label">🫁 呼吸</div><div class="guide-item-text">${ex.guide.breath}</div></div>
      </div>
      <a class="video-link" href="${ex.video}" target="_blank" rel="noopener">▶ フォーム解説動画を見る</a>
      ${setsHtml}
      ${bulkHtml}
      <button class="btn-done" onclick="markDone('${key}')">${isDone ? '✓ 完了済み' : 'この種目完了！'}</button>
      ${isDone ? `<button class="btn-undone" onclick="markUndone('${key}')">取り消し</button>` : ''}
    </div>`;
  }

  return `
    <div class="exercise-card${isDone?' done':''}${isExpanded?' expanded':''}" id="card-${key}">
      <div class="exercise-header" onclick="toggleCard('${key}')">
        <div class="order-badge">${i+1}</div>
        <div class="exercise-check"><span class="check-icon">✓</span></div>
        <div class="exercise-info">
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-meta">
            <span>📍 ${ex.machine}</span>
            <span>🔄 ${defSets}セット</span>
          </div>
        </div>
        <div class="exercise-last">
          <div class="exercise-last-weight">${s.weights[0]}kg</div>
          <div class="exercise-last-label">前回</div>
        </div>
      </div>
      ${detail}
    </div>`;
}

function toggleCard(key) {
  pendingBulk = null;
  expandedId = (expandedId === key) ? null : key;
  renderExerciseList();
}

function onNumChange(key, field, idx, val) {
  const v = parseFloat(val) || 0;
  sessionState[key][field][idx] = v;
  const arr = sessionState[key][field];
  const othersDiffer = arr.some((x, j) => j !== idx && x !== v);
  if (arr.length > 1 && othersDiffer) {
    pendingBulk = { exKey: key, field, value: v, setIndex: idx };
  } else {
    pendingBulk = null;
  }
  renderExerciseList();
}

function applyBulk(applyAll) {
  if (pendingBulk && applyAll) {
    const { exKey, field, value } = pendingBulk;
    sessionState[exKey][field] = sessionState[exKey][field].map(() => value);
  }
  pendingBulk = null;
  renderExerciseList();
}

function markDone(key) {
  sessionState[key].done = true;
  expandedId = null; pendingBulk = null;
  const wMem = getMem('gymlog_weights'); wMem[key] = [...sessionState[key].weights]; saveMem('gymlog_weights', wMem);
  const rMem = getMem('gymlog_reps'); rMem[key] = [...sessionState[key].reps]; saveMem('gymlog_reps', rMem);
  renderExerciseList(); updateDoneCount(); showToast('✓ 完了！');
}
function markUndone(key) {
  sessionState[key].done = false;
  renderExerciseList(); updateDoneCount();
}

function updateDoneCount() {
  const p = PROGRAMS[currentProgram];
  if (!p) return;
  const done = p.exercises.filter(([exId]) => sessionState[currentProgram+'_'+exId]?.done).length;
  const el = document.getElementById('doneCount');
  if (el) el.textContent = done;
  const btn = document.getElementById('btnFinish');
  if (btn) {
    btn.disabled = done < p.exercises.length;
    btn.textContent = done === p.exercises.length ? '🎉 トレーニング完了！' : `完了（${done}/${p.exercises.length}）`;
  }
}

function finishWorkout() {
  const p = PROGRAMS[currentProgram];
  const today = new Date();
  const dateKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  let h = getHistory().filter(r => r.date !== dateKey);
  h.push({
    date: dateKey, programId: currentProgram, label: p.name, color: p.color,
    exercises: p.exercises.map(([exId, sets]) => {
      const s = sessionState[currentProgram+'_'+exId];
      return { exId, name: EX_DB[exId].name, sets, reps: [...s.reps], weights: [...s.weights] };
    })
  });
  h.sort((a,b)=>a.date.localeCompare(b.date));
  saveHistoryAll(h);
  currentProgram = null; sessionState = {}; expandedId = null;
  stopTimer();
  showToast('🎉 お疲れ様！');
  showTab('analysis');
}

// ═══════════════════════════════════════════════
// 休憩タイマー
// ═══════════════════════════════════════════════
function startTimer(sec) {
  stopTimer();
  timerRemain = sec;
  document.getElementById('t'+sec)?.classList.add('active');
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerRemain--;
    updateTimerDisplay();
    if (timerRemain <= 0) {
      stopTimer();
      showToast('⏱ 休憩終了！次のセットへ');
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
    }
  }, 1000);
}
function stopTimer() {
  clearInterval(timerInterval); timerInterval = null;
  document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
  const d = document.getElementById('timerDisplay');
  if (d) d.textContent = '--';
}
function updateTimerDisplay() {
  const d = document.getElementById('timerDisplay');
  if (d) d.textContent = timerRemain > 0 ? `${timerRemain}秒` : '--';
}

// 分析タブ
// ═══════════════════════════════════════════════
function renderAnalysis() {
  const h = getHistory();
  // 統計
  const now = new Date();
  const weekStart = new Date(now); weekStart.setDate(now.getDate() - ((now.getDay()+6)%7)); weekStart.setHours(0,0,0,0);
  const thisWeek = h.filter(r => new Date(r.date) >= weekStart);
  const weekVolume = thisWeek.reduce((sum, r) =>
    sum + r.exercises.reduce((s2, ex) =>
      s2 + ex.weights.reduce((s3, w, i) => s3 + w * (Array.isArray(ex.reps) ? (ex.reps[i]||0) : ex.reps), 0), 0), 0);

  let html = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value">${h.length}</div><div class="stat-label">累計回数</div></div>
      <div class="stat-card"><div class="stat-value">${thisWeek.length}</div><div class="stat-label">今週の回数</div></div>
      <div class="stat-card"><div class="stat-value">${weekVolume >= 1000 ? (weekVolume/1000).toFixed(1)+'t' : weekVolume+'kg'}</div><div class="stat-label">今週の総重量</div></div>
    </div>

    <div class="section-label">カレンダー</div>
    ${renderCalendar(h)}

    <div class="section-label">筋肉の回復状況</div>
    ${renderRecovery(h)}

    <div class="section-label">履歴</div>
    ${renderHistoryList(h)}
  `;
  document.getElementById('mainContent').innerHTML = html;
}

function renderCalendar(h) {
  const first = new Date(calYear, calMonth, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date();
  const todayKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  const dows = ['日','月','火','水','木','金','土'];
  let cells = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < startDow; i++) cells += `<div class="cal-day other"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec = h.find(r => r.date === key);
    const isToday = key === todayKey;
    let cls = 'cal-day' + (isToday ? ' today' : '') + (rec ? ' trained' : '');
    let dot = rec ? `<div class="cal-dot dot-${rec.color}"></div>` : '';
    cells += `<div class="${cls}">${d}${dot}</div>`;
  }
  return `<div class="calendar-card">
    <div class="calendar-head">
      <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
      <div class="calendar-month">${calYear}年${calMonth+1}月</div>
      <button class="cal-nav-btn" onclick="calNav(1)">›</button>
    </div>
    <div class="calendar-grid">${cells}</div>
    <div style="display:flex;gap:12px;margin-top:10px;font-size:10px;color:var(--text-muted)">
      <span><span style="color:#a891ff">●</span> Day A</span>
      <span><span style="color:#3ecf8e">●</span> Day B</span>
      <span><span style="color:#f7a548">●</span> Day C</span>
      <span><span style="color:#5ac8fa">●</span> 部位別</span>
    </div>
  </div>`;
}
function calNav(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderAnalysis();
}

function renderRecovery(h) {
  const now = new Date();
  // 各筋肉の最終トレーニング日時を探す
  const lastTrained = {};
  h.forEach(rec => {
    rec.exercises.forEach(ex => {
      const def = ex.exId ? EX_DB[ex.exId] : Object.values(EX_DB).find(e => e.name === ex.name);
      if (!def) return;
      def.muscles.forEach(m => {
        if (!lastTrained[m] || rec.date > lastTrained[m]) lastTrained[m] = rec.date;
      });
    });
  });
  let rows = Object.entries(MUSCLES).map(([mid, m]) => {
    let pct = 100, colorVar = 'var(--green)';
    if (lastTrained[mid]) {
      const trainedAt = new Date(lastTrained[mid] + 'T20:00:00');
      const hours = (now - trainedAt) / 3600000;
      pct = Math.min(100, Math.round(hours / m.hours * 100));
      if (pct < 0) pct = 0;
    }
    if (pct < 50) colorVar = 'var(--danger)';
    else if (pct < 90) colorVar = 'var(--yellow)';
    const label = pct >= 100 ? '回復済' : pct + '%';
    return `<div class="recovery-row">
      <div class="recovery-name">${m.name}</div>
      <div class="recovery-bar-bg"><div class="recovery-bar" style="width:${pct}%;background:${colorVar}"></div></div>
      <div class="recovery-pct" style="color:${colorVar}">${label}</div>
    </div>`;
  }).join('');
  return `<div class="recovery-card">${rows}
    <div style="font-size:10px;color:var(--text-muted);margin-top:8px">※ 大筋群72h・小筋群48hで回復と仮定した目安です</div>
  </div>`;
}

function renderHistoryList(h) {
  if (h.length === 0) return `<div class="history-empty">まだ記録がありません</div>`;
  const rev = h.slice().reverse();
  return rev.map((rec, idx) => {
    const d = new Date(rec.date);
    const days = ['日','月','火','水','木','金','土'];
    const dateStr = `${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
    const badgeCls = 'day-' + (rec.color || 'p');
    const badgeLabel = rec.programId?.startsWith('day') ? 'DAY ' + rec.programId.slice(3) : '部位別';
    return `
      <div class="history-session" id="hs-${idx}">
        <div class="history-session-header" onclick="document.getElementById('hs-${idx}').classList.toggle('open')">
          <div>
            <div class="history-session-date">${dateStr}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${rec.label}</div>
          </div>
          <span class="history-session-day ${badgeCls}">${badgeLabel}</span>
        </div>
        <div class="history-session-body">
          ${rec.exercises.map(ex => {
            const reps = Array.isArray(ex.reps) ? ex.reps : Array(ex.sets).fill(ex.reps || '-');
            return `<div class="history-exercise-row">
              <span class="history-exercise-name">${ex.name}</span>
              <span class="history-exercise-sets">${ex.weights.map((w,i)=>`${w}kg×${reps[i]}`).join(' / ')}</span>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
